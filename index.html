<!DOCTYPE html>
<html>
<head>
    <title>Ecomm Store</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #222;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .products {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            width: 200px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .card img {
            width: 100%;
            border-radius: 10px;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<header>
    <h1>Ecomm Store</h1>
    <p>Your CI/CD Demo eCommerce Website</p>
</header>

<div class="products">

    <div class="card">
        <img src="https://via.placeholder.com/200" alt="Product">
        <h3>Headphones</h3>
        <p>Rs999</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200" alt="Product">
        <h3>Smart Watch</h3>
        <p>Rs1999</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200" alt="Product">
        <h3>Mobile Phone</h3>
        <p>Rs9999</p>
        <button>Buy Now</button>
    </div>

</div>

</body>
</html>
